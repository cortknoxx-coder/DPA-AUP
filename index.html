
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-t" />
    <title>DPA Artist Portal</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="dpa-internal-api-base" content="" />
    <meta name="dpa-bridge-ws-url" content="" />
    <meta name="dpa-api-base-url" content="" />
    <meta name="dpa-device-api-base" content="" />
    <meta name="dpa-device-upload-base" content="" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for pro-audio look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }
      body {
        background-color: #020617; /* Slate 950 */
        color: #f8fafc; /* Slate 50 */
      }

      /* Hide number input spinners */
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type=number] {
        -moz-appearance: textfield;
      }
      
      /* Animations for "Fun" Factor */
      @keyframes breathe {
        0%, 100% { box-shadow: 0 0 20px -5px var(--glow-color, transparent); }
        50% { box-shadow: 0 0 35px 5px var(--glow-color, transparent); }
      }
      @keyframes pulse-fast {
        0%, 100% { box-shadow: 0 0 20px -5px var(--glow-color, transparent); }
        50% { box-shadow: 0 0 30px 0px var(--glow-color, transparent); }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes bounce {
        0%, 100% { transform: scaleY(0.4); }
        50% { transform: scaleY(1.0); }
      }
      
      @keyframes flash {
        0%, 100% { box-shadow: 0 0 0 0 transparent; opacity: 0; }
        10%, 90% { box-shadow: 0 0 40px 8px var(--glow-color, transparent); opacity: 1; }
      }
      @keyframes rhythmic-pulse {
        0%, 100% { box-shadow: 0 0 15px -5px var(--glow-color, transparent); }
        50% { box-shadow: 0 0 35px 5px var(--glow-color, transparent); }
      }
      @keyframes fade-glow {
        0% { box-shadow: 0 0 0 0 transparent; opacity: 0; }
        30% { box-shadow: 0 0 35px 5px var(--glow-color, transparent); opacity: 1; }
        70% { box-shadow: 0 0 35px 5px var(--glow-color, transparent); opacity: 1; }
        100% { box-shadow: 0 0 0 0 transparent; opacity: 0; }
      }

      .animate-breathe { animation: breathe 4s ease-in-out infinite; }
      .animate-pulse-fast { animation: pulse-fast 1.2s ease-in-out infinite; }
      .animate-spin-slow { animation: spin-slow 8s linear infinite; }
      .animate-fade-in-up { animation: fade-in-up 0.3s ease-out forwards; }
      .animate-flash { animation: flash 0.6s ease-in-out; }
      .animate-rhythmic-pulse { animation: rhythmic-pulse var(--pulse-duration, 500ms) ease-in-out infinite; }
      .animate-fade-glow { animation: fade-glow 7s ease-in-out; }
      .led-solid { box-shadow: 0 0 30px 4px var(--glow-color, transparent); }
      .led-off { box-shadow: none !important; opacity: 0; }
    </style>

{

    "rxjs/fetch": "https://esm.sh/rxjs@^7.8.2/fetch?conditions=es2015",
    "@angular/compiler": "https://next.esm.sh/@angular/compiler@^21.0.6?external=rxjs",
    "@angular/core": "https://next.esm.sh/@angular/core@^21.0.6?external=rxjs",
    "@angular/router": "https://next.esm.sh/@angular/router@^21.0.6?external=rxjs",
    "@angular/platform-browser": "https://next.esm.sh/@angular/platform-browser@^21.0.6?external=rxjs",
    "@angular/forms": "https://next.esm.sh/@angular/forms@^21.0.6?external=rxjs",
    "@angular/common": "https://next.esm.sh/@angular/common@^21.0.6?external=rxjs",

}
