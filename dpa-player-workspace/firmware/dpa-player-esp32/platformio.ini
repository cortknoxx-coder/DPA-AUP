; PlatformIO Project Configuration — DPA Player firmware
; Target: Waveshare ESP32-S3 Zero (8MB flash, USB-C CDC)
; Framework: pure ESP-IDF 5.x (NO Arduino core)
;
; Build:   pio run
; Upload:  pio run --target upload
; Monitor: pio device monitor -b 115200
; Clean:   pio run --target clean
;
; Phase 0 scaffold — prints "DPA Player boot" over USB CDC.
; Arduino reference source lives under arduino-src/ and will be
; progressively ported to ESP-IDF APIs in later phases.

[env:esp32s3]
platform  = espressif32@^6.9.0
board     = esp32-s3-devkitc-1
framework = espidf

; 8MB flash, custom partition layout inherited from DPA Album scaffold
board_build.flash_size = 8MB
board_build.partitions = partitions.csv

; Native USB CDC on boot for Serial logs (Waveshare ESP32-S3 Zero)
build_flags =
    -DCONFIG_ESP_CONSOLE_USB_CDC=1

; Monitor
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder
