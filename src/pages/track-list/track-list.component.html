<div class="max-w-4xl">
  <!-- List -->
  <div class="rounded-xl border border-slate-800 bg-slate-900/50 overflow-hidden">
    <table class="min-w-full text-sm">
      <thead class="bg-slate-900 border-b border-slate-800">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider w-12">#</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Title</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">ID</th>
          <th class="px-4 py-3 text-right text-xs font-semibold text-slate-400 uppercase tracking-wider">Duration</th>
          <th class="px-4 py-3 text-right text-xs font-semibold text-slate-400 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-800/50">
        @for (track of album()?.tracks; track track.id) {
          <tr class="hover:bg-slate-800/30 transition-colors group">
            <td class="px-4 py-3 text-slate-500 font-mono text-xs">{{ track.trackIndex + 1 }}</td>
            <td class="px-4 py-3 text-slate-100 font-medium">{{ track.title }}</td>
            <td class="px-4 py-3 text-slate-500 font-mono text-xs">{{ track.trackId }}</td>
            <td class="px-4 py-3 text-right text-slate-400 font-mono text-xs">{{ formatTime(track.durationSec) }}</td>
            <td class="px-4 py-3 text-right">
              <button (click)="deleteTrack(track.trackId)" class="text-rose-500 hover:text-rose-300 text-xs opacity-0 group-hover:opacity-100 transition-opacity">
                Delete
              </button>
            </td>
          </tr>
        }
        @empty {
          <tr>
            <td colspan="5" class="px-4 py-8 text-center text-slate-500 text-xs">
              No tracks yet. Add one below.
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <!-- Add Form -->
  <div class="mt-8 p-6 rounded-xl border border-slate-800 bg-slate-900/30">
    <h3 class="text-sm font-semibold text-slate-100 mb-4">Add Track</h3>
    <div class="flex gap-4 items-end">
      <div class="flex-1">
        <label class="block text-xs text-slate-400 mb-1">Track Title</label>
        <input [(ngModel)]="newTitle" class="w-full rounded bg-slate-950 border border-slate-800 px-3 py-2 text-sm text-slate-100 focus:border-teal-500 outline-none" placeholder="e.g. Intro">
      </div>
      <div class="w-32">
        <label class="block text-xs text-slate-400 mb-1">Duration (s)</label>
        <input type="number" [(ngModel)]="newDuration" class="w-full rounded bg-slate-950 border border-slate-800 px-3 py-2 text-sm text-slate-100 focus:border-teal-500 outline-none">
      </div>
      <button (click)="addTrack()" [disabled]="!newTitle()" class="rounded bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-500 disabled:opacity-50 disabled:cursor-not-allowed">
        Add
      </button>
    </div>
  </div>
</div>
