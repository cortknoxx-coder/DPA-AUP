<form [formGroup]="form" (ngSubmit)="save()" class="space-y-8 max-w-4xl">
  
  <!-- Colors -->
  <section class="rounded-xl border border-slate-800 bg-slate-900/50 p-6" formGroupName="albumColor">
    <h2 class="text-sm font-semibold text-slate-100 mb-1">Album Palette</h2>
    <p class="text-xs text-slate-500 mb-4">Defines the companion app UI and primary LED bias.</p>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div>
        <label class="block text-xs text-slate-400 mb-2">Primary</label>
        <div class="flex gap-2">
          <input type="color" formControlName="primary" class="h-9 w-12 rounded bg-transparent cursor-pointer">
          <input type="text" formControlName="primary" class="flex-1 rounded bg-slate-950 border border-slate-800 px-3 py-1 text-xs text-slate-300 font-mono">
        </div>
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-2">Accent</label>
        <div class="flex gap-2">
          <input type="color" formControlName="accent" class="h-9 w-12 rounded bg-transparent cursor-pointer">
          <input type="text" formControlName="accent" class="flex-1 rounded bg-slate-950 border border-slate-800 px-3 py-1 text-xs text-slate-300 font-mono">
        </div>
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-2">Background</label>
        <div class="flex gap-2">
          <input type="color" formControlName="background" class="h-9 w-12 rounded bg-transparent cursor-pointer">
          <input type="text" formControlName="background" class="flex-1 rounded bg-slate-950 border border-slate-800 px-3 py-1 text-xs text-slate-300 font-mono">
        </div>
      </div>
    </div>
  </section>

  <!-- LED Behavior -->
  <section class="rounded-xl border border-slate-800 bg-slate-900/50 p-6" formGroupName="led">
    <h2 class="text-sm font-semibold text-slate-100 mb-1">LED Behavior</h2>
    <p class="text-xs text-slate-500 mb-4">Hardware light patterns for different device states.</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div formGroupName="idle" class="space-y-3">
        <span class="text-xs font-semibold text-slate-300 block uppercase">Idle</span>
        <div class="flex gap-2">
          <input type="color" formControlName="color" class="h-8 w-8 rounded bg-transparent">
          <input type="text" formControlName="color" class="w-full rounded bg-slate-950 border border-slate-800 px-2 py-1 text-xs font-mono">
        </div>
        <select formControlName="pattern" class="w-full rounded bg-slate-950 border border-slate-800 px-2 py-1.5 text-xs text-slate-300">
          <option value="breathing">Breathing</option>
          <option value="solid">Solid</option>
          <option value="off">Off</option>
        </select>
      </div>

      <div formGroupName="playback" class="space-y-3">
        <span class="text-xs font-semibold text-slate-300 block uppercase">Playback</span>
        <div class="flex gap-2">
          <input type="color" formControlName="color" class="h-8 w-8 rounded bg-transparent">
          <input type="text" formControlName="color" class="w-full rounded bg-slate-950 border border-slate-800 px-2 py-1 text-xs font-mono">
        </div>
        <select formControlName="pattern" class="w-full rounded bg-slate-950 border border-slate-800 px-2 py-1.5 text-xs text-slate-300">
          <option value="pulse">Pulse</option>
          <option value="solid">Solid</option>
        </select>
      </div>

      <div formGroupName="charging" class="space-y-3">
        <span class="text-xs font-semibold text-slate-300 block uppercase">Charging</span>
        <div class="flex gap-2">
          <input type="color" formControlName="color" class="h-8 w-8 rounded bg-transparent">
          <input type="text" formControlName="color" class="w-full rounded bg-slate-950 border border-slate-800 px-2 py-1 text-xs font-mono">
        </div>
        <select formControlName="pattern" class="w-full rounded bg-slate-950 border border-slate-800 px-2 py-1.5 text-xs text-slate-300">
          <option value="breathing">Breathing</option>
          <option value="solid">Solid</option>
        </select>
      </div>
    </div>
  </section>

  <!-- DCNP -->
  <section class="rounded-xl border border-slate-800 bg-slate-900/50 p-6" formGroupName="dcnp">
    <h2 class="text-sm font-semibold text-slate-100 mb-1">Perk Colors (DCNP)</h2>
    <p class="text-xs text-slate-500 mb-4">Notification colors for pushed events.</p>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div>
        <label class="block text-xs text-slate-400 mb-1">Concert</label>
        <input type="color" formControlName="concert" class="w-full h-8 rounded bg-transparent">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Video</label>
        <input type="color" formControlName="video" class="w-full h-8 rounded bg-transparent">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Merch</label>
        <input type="color" formControlName="merch" class="w-full h-8 rounded bg-transparent">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Signing</label>
        <input type="color" formControlName="signing" class="w-full h-8 rounded bg-transparent">
      </div>
    </div>
  </section>

  <div class="flex justify-end pt-4">
    <button type="submit" class="rounded bg-teal-600 px-6 py-2 text-sm font-semibold text-white hover:bg-teal-500 shadow-lg shadow-teal-900/20">
      Save Theme & Queue Rebuild
    </button>
  </div>
</form>
