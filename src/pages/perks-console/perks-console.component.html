<div class="max-w-4xl space-y-8">
  <div class="rounded-xl border border-slate-800 bg-slate-900/50 p-6">
    <h2 class="text-sm font-semibold text-slate-100 mb-4">Push New Perk</h2>
    <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-4 items-end">
      <div class="lg:col-span-1">
        <label class="block text-xs text-slate-400 mb-1">Type</label>
        <select [(ngModel)]="eventType" class="w-full rounded bg-slate-950 border border-slate-800 px-3 py-2 text-sm text-slate-100 focus:border-teal-500 outline-none">
          <option value="concert">Concert</option>
          <option value="video">Video</option>
          <option value="merch">Merch</option>
          <option value="signing">Signing</option>
        </select>
      </div>
      <div class="lg:col-span-2">
        <label class="block text-xs text-slate-400 mb-1">Title / Headline</label>
        <input [(ngModel)]="title" class="w-full rounded bg-slate-950 border border-slate-800 px-3 py-2 text-sm text-slate-100 focus:border-teal-500 outline-none" placeholder="e.g. Secret Show in London">
      </div>
      <div class="lg:col-span-1">
        <button (click)="create()" [disabled]="!title" class="w-full rounded bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-500 disabled:opacity-50">
          Push Event
        </button>
      </div>
    </div>
  </div>

  <div class="rounded-xl border border-slate-800 bg-slate-900/50 overflow-hidden">
    <table class="min-w-full text-sm">
      <thead class="bg-slate-900 border-b border-slate-800">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Status</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Type</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Content</th>
          <th class="px-4 py-3 text-right text-xs font-semibold text-slate-400 uppercase">Created</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-800/50">
        @for (ev of album()?.dcnpEvents; track ev.id) {
          <tr>
            <td class="px-4 py-3">
              <span class="inline-flex rounded-full px-2 py-0.5 text-[10px] font-medium"
                [class.bg-teal-900-30]="ev.status === 'delivered'"
                [class.text-teal-400]="ev.status === 'delivered'"
                [class.bg-amber-900-30]="ev.status === 'pending'"
                [class.text-amber-400]="ev.status === 'pending'">
                {{ ev.status | uppercase }}
              </span>
            </td>
            <td class="px-4 py-3 text-slate-300 capitalize">{{ ev.eventType }}</td>
            <td class="px-4 py-3 text-slate-100">{{ ev.payload.data.title }}</td>
            <td class="px-4 py-3 text-right text-slate-500 text-xs font-mono">
              {{ ev.createdAt | date:'short' }}
            </td>
          </tr>
        }
        @empty {
          <tr><td colspan="4" class="p-6 text-center text-slate-500 text-xs">No events history.</td></tr>
        }
      </tbody>
    </table>
  </div>
</div>
