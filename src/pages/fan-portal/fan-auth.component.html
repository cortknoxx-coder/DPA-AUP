
<div class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
  <!-- Background Effects -->
  <div class="absolute -top-1/4 -left-1/4 w-1/2 h-1/2 bg-indigo-900/20 rounded-full blur-3xl pointer-events-none animate-pulse-fast"></div>
  <div class="absolute -bottom-1/4 -right-1/4 w-1/2 h-1/2 bg-teal-900/20 rounded-full blur-3xl pointer-events-none animate-breathe"></div>

  <div class="w-full max-w-md text-center z-10">
    <div class="inline-flex items-center justify-center h-16 w-16 rounded-xl bg-gradient-to-br from-indigo-500 to-teal-600 shadow-[0_0_30px_rgba(79,70,229,0.3)] mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M12 6V3m0 18v-3" /></svg>
    </div>
    <h1 class="text-3xl font-bold text-slate-100 tracking-tight">Authenticate Your Device</h1>
    <p class="text-slate-400 mt-2">Connect your DPA™ to unlock your library.</p>
  </div>

  <div class="w-full max-w-sm space-y-4 mt-12 z-10">
    <button (click)="connectUSB()" class="w-full group relative flex items-center gap-4 px-6 py-4 rounded-xl border border-slate-700 bg-slate-900/50 hover:bg-slate-800/70 hover:border-teal-500/50 transition-all duration-300 transform hover:-translate-y-1 shadow-lg overflow-hidden">
      <div class="absolute left-0 top-0 bottom-0 w-1 bg-teal-500 rounded-l-xl transition-transform duration-300 scale-y-0 group-hover:scale-y-100 origin-center"></div>
      <div class="text-teal-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
      </div>
      <div class="text-left flex-1">
        <h3 class="font-semibold text-white">USB-C Bridge</h3>
        <p class="text-xs text-slate-400">Connect via the DPA Desktop Bridge application.</p>
      </div>
    </button>
    <button (click)="connectBluetooth()" class="w-full group relative flex items-center gap-4 px-6 py-4 rounded-xl border border-slate-700 bg-slate-900/50 hover:bg-slate-800/70 hover:border-indigo-500/50 transition-all duration-300 transform hover:-translate-y-1 shadow-lg overflow-hidden">
      <div class="absolute left-0 top-0 bottom-0 w-1 bg-indigo-500 rounded-l-xl transition-transform duration-300 scale-y-0 group-hover:scale-y-100 origin-center"></div>
      <div class="text-indigo-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6.343 17.657l11.314-11.314m-11.314 0l11.314 11.314L12 12l-5.657 5.657z" /></svg>
      </div>
      <div class="text-left flex-1">
        <h3 class="font-semibold text-white">Bluetooth LE</h3>
        <p class="text-xs text-slate-400">Pair directly with your computer.</p>
      </div>
    </button>
    <button (click)="connectNFC()" class="w-full group relative flex items-center gap-4 px-6 py-4 rounded-xl border border-slate-700 bg-slate-900/50 hover:bg-slate-800/70 hover:border-sky-500/50 transition-all duration-300 transform hover:-translate-y-1 shadow-lg overflow-hidden">
      <div class="absolute left-0 top-0 bottom-0 w-1 bg-sky-500 rounded-l-xl transition-transform duration-300 scale-y-0 group-hover:scale-y-100 origin-center"></div>
      <div class="text-sky-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h5M4 15v5h5M15 4h5v5M15 20h5v-5" /></svg>
      </div>
      <div class="text-left flex-1">
        <h3 class="font-semibold text-white">NFC Tap</h3>
        <p class="text-xs text-slate-400">Tap your DPA to an NFC reader.</p>
      </div>
    </button>
  </div>
  
  <div class="mt-8 z-10">
    <button (click)="useSimulator()" class="text-xs text-slate-500 hover:text-amber-400 transition-colors">
      No device? Use Simulator
    </button>
  </div>
</div>
