; PlatformIO Project Configuration
; DPA ESP32-S3 Zero Firmware
;
; Uses pioarduino platform (Arduino Core 3.x + ESP-IDF 5.x)
; Required for driver/i2s_std.h new I2S driver API
;
; Build:   pio run
; Upload:  pio run --target upload
;           pio run -t upload --upload-port /dev/cu.usbmodem101   (ESP32-S3 USB CDC; hub "port 1" is often this device)
; Monitor: pio device monitor -b 115200
; Clean:   pio run --target clean

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = waveshare_esp32_s3_zero
framework = arduino

; Board settings matching Arduino IDE config from dpa-esp32.ino header:
;   Board:            Waveshare ESP32-S3 Zero
;   Flash Size:       8MB
;   Partition Scheme: Custom — single full-flash factory app, no OTA, no SPIFFS
;   PSRAM:            Enabled (embedded 8MB, OPI)
;   USB CDC On Boot:  Enabled
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi

; USB CDC for Serial output (Waveshare ESP32-S3 Zero has USB-C, no separate UART chip)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Monitor
monitor_speed = 115200

; Library dependencies (mathieucarbou forks for Arduino Core 3.x compatibility)
lib_deps =
    fastled/FastLED@3.9.12
    mathieucarbou/ESPAsyncWebServer@^3.6.0
    mathieucarbou/AsyncTCP@^3.3.0
